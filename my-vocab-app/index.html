<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>나만의 영단어</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <h1 id="page-title">단어장</h1>
      <p id="page-subtitle" class="subtitle">오늘 복습할 단어를 확인하세요</p>
    </header>

    <main class="main-content">
      <!-- 단어장 -->
      <section id="screen-words" class="screen active">
        <div class="stats-row" id="stats-row"></div>

        <form id="word-form" class="card form-card">
          <h2>단어 추가</h2>
          <label>영어 단어<input type="text" id="input-english" required placeholder="apple" /></label>
          <label>뜻<input type="text" id="input-meaning" required placeholder="사과" /></label>
          <label>영어 예문<input type="text" id="input-example" placeholder="I eat an apple." /></label>
          <label>예문 해석<input type="text" id="input-example-ko" placeholder="나는 사과를 먹는다." /></label>
          <button type="submit" class="btn primary">저장</button>
        </form>

        <div id="study-card" class="card study-card hidden">
          <p class="label">학습 중</p>
          <h2 id="study-english"></h2>
          <div id="study-details" class="hidden">
            <p class="meaning" id="study-meaning"></p>
            <p class="example" id="study-example"></p>
            <p class="example-ko" id="study-example-ko"></p>
          </div>
          <button type="button" id="btn-reveal" class="btn secondary">뜻 보기</button>
          <div class="row-btns">
            <button type="button" id="btn-prev-word" class="btn ghost">이전</button>
            <button type="button" id="btn-next-word" class="btn ghost">다음</button>
          </div>
        </div>

        <ul id="word-list" class="word-list"></ul>
      </section>

      <!-- 퀴즈 -->
      <section id="screen-quiz" class="screen">
        <div class="card quiz-card">
          <p class="quiz-meta" id="quiz-meta"></p>
          <h2 id="quiz-question"></h2>
          <input type="text" id="quiz-answer" placeholder="뜻을 입력하세요" autocomplete="off" />
          <button type="button" id="btn-quiz-submit" class="btn primary">정답 확인</button>
          <p id="quiz-feedback" class="feedback hidden"></p>
          <button type="button" id="btn-quiz-next" class="btn secondary hidden">다음 문제</button>
        </div>
        <div id="quiz-summary" class="card hidden">
          <h2>퀴즈 결과</h2>
          <p id="quiz-result-text"></p>
          <button type="button" id="btn-quiz-restart" class="btn primary">다시 풀기</button>
        </div>
      </section>

      <!-- 복습 일정 -->
      <section id="screen-review" class="screen">
        <ul id="review-list" class="word-list"></ul>
        <p id="review-empty" class="empty-msg hidden">복습 예정 단어가 없습니다.</p>
      </section>
    </main>

    <nav class="bottom-nav">
      <button type="button" class="nav-btn active" data-screen="words">단어장</button>
      <button type="button" class="nav-btn" data-screen="quiz">퀴즈</button>
      <button type="button" class="nav-btn" data-screen="review">복습</button>
    </nav>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
